name: backend-dev-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target_env:
        description: "Terraform deploy environment profile under infra/terraform/envs."
        required: true
        default: dev
        type: string
      apply:
        description: "Apply the Terraform plan. Leave false for plan-only validation."
        required: true
        default: false
        type: boolean

env:
  AWS_REGION: ap-northeast-2
  TF_DIR: infra/terraform
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: backend-dev-deploy-main
  cancel-in-progress: false

jobs:
  deploy-dev:
    name: Deploy dev backend
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target_env || 'dev' }}
    timeout-minutes: 35
    env:
      TARGET_ENV: ${{ github.event.inputs.target_env || 'dev' }}
    steps:
      - uses: actions/checkout@v7

      - name: Resolve deploy profile
        id: deploy-profile
        env:
          GITHUB_VARIABLES_JSON: ${{ toJson(vars) }}
        run: |
          python - <<'PY' >>"$GITHUB_OUTPUT"
          import json
          import os
          import re
          import sys

          target_env = os.environ["TARGET_ENV"]
          if not re.fullmatch(r"[a-z0-9][a-z0-9-]*", target_env):
              print(f"Invalid target_env: {target_env}", file=sys.stderr)
              sys.exit(1)
          if target_env != "dev" and not target_env.startswith("dev-"):
              print(
                  "backend-dev-deploy only accepts dev or dev-* target_env values. "
                  f"Use a dedicated workflow for {target_env}.",
                  file=sys.stderr,
              )
              sys.exit(1)

          variables = json.loads(os.environ["GITHUB_VARIABLES_JSON"])
          env_key = f"AWS_{target_env.upper().replace('-', '_')}_DEPLOY_ROLE_ARN"
          role_arn = variables.get(env_key)
          if not role_arn and target_env == "dev":
              role_arn = variables.get("AWS_DEV_DEPLOY_ROLE_ARN")
          if not role_arn:
              print(f"Missing GitHub variable {env_key}.", file=sys.stderr)
              sys.exit(1)

          tf_var_file = f"envs/{target_env}/deploy.auto.tfvars.json"
          tf_backend_config = f"backends/{target_env}.hcl"
          tf_var_path = os.path.join(os.environ["TF_DIR"], tf_var_file)
          tf_backend_path = os.path.join(os.environ["TF_DIR"], tf_backend_config)

          if not os.path.isfile(tf_backend_path) or not os.path.isfile(tf_var_path):
              backend_config_hcl = variables.get("TF_BACKEND_CONFIG_HCL")
              tfvars_json = variables.get("TFVARS_JSON")
              if not backend_config_hcl or not tfvars_json:
                  print(
                      "Missing deploy profile file(s), and GitHub Environment "
                      "variables TF_BACKEND_CONFIG_HCL/TFVARS_JSON are not both set.",
                      file=sys.stderr,
                  )
                  sys.exit(1)

              if "bucket" not in backend_config_hcl or "key" not in backend_config_hcl:
                  print(
                      "TF_BACKEND_CONFIG_HCL must include Terraform backend bucket and key.",
                      file=sys.stderr,
                  )
                  sys.exit(1)

              try:
                  parsed_tfvars = json.loads(tfvars_json)
              except json.JSONDecodeError as exc:
                  print(f"TFVARS_JSON is not valid JSON: {exc}", file=sys.stderr)
                  sys.exit(1)
              if not isinstance(parsed_tfvars, dict):
                  print("TFVARS_JSON must be a JSON object.", file=sys.stderr)
                  sys.exit(1)
              if parsed_tfvars.get("environment") != target_env:
                  print(
                      "TFVARS_JSON environment must match target_env "
                      f"({target_env}).",
                      file=sys.stderr,
                  )
                  sys.exit(1)

              def list_value(name):
                  value = parsed_tfvars.get(name, [])
                  return value if isinstance(value, list) else []

              semantic_errors = []
              chat_provider = parsed_tfvars.get("chat_provider", "mock")
              agentcore_enabled = bool(parsed_tfvars.get("agentcore_runtime_enabled", False))
              agentcore_container_uri = str(
                  parsed_tfvars.get("agentcore_runtime_container_uri", "")
              ).strip()
              lambda_subnet_ids = list_value("lambda_subnet_ids")
              lambda_nat_route_subnet_ids = list_value("lambda_nat_route_subnet_ids")
              nat_public_subnet_id = str(
                  parsed_tfvars.get("lambda_nat_public_subnet_id", "")
              ).strip()
              nat_create_public_subnet = bool(
                  parsed_tfvars.get("lambda_nat_create_public_subnet", False)
              )
              nat_public_subnet_cidr = str(
                  parsed_tfvars.get("lambda_nat_public_subnet_cidr_block", "")
              ).strip()
              nat_internet_gateway_id = str(
                  parsed_tfvars.get("lambda_nat_internet_gateway_id", "")
              ).strip()
              nat_create_internet_gateway = bool(
                  parsed_tfvars.get("lambda_nat_create_internet_gateway", False)
              )
              live_chat_provider_enabled = chat_provider in {"bedrock", "agentcore"}

              if agentcore_enabled and not agentcore_container_uri:
                  semantic_errors.append(
                      "agentcore_runtime_enabled=true requires "
                      "agentcore_runtime_container_uri."
                  )
              if chat_provider == "agentcore" and not agentcore_enabled:
                  semantic_errors.append(
                      "chat_provider=agentcore requires agentcore_runtime_enabled=true."
                  )
              if chat_provider == "agentcore" and not agentcore_container_uri:
                  semantic_errors.append(
                      "chat_provider=agentcore requires a non-empty "
                      "agentcore_runtime_container_uri."
                  )
              if parsed_tfvars.get("agentcore_network_mode", "PUBLIC") == "VPC":
                  managed_networking = (
                      bool(parsed_tfvars.get("vpc_id"))
                      and bool(list_value("db_subnet_ids"))
                      and bool(lambda_subnet_ids)
                  )
                  explicit_security_groups = bool(list_value("lambda_security_group_ids"))
                  if not managed_networking and not explicit_security_groups:
                      semantic_errors.append(
                          "agentcore_network_mode=VPC requires managed networking "
                          "(vpc_id, db_subnet_ids, lambda_subnet_ids) or "
                          "lambda_security_group_ids."
                      )
              if lambda_subnet_ids and live_chat_provider_enabled:
                  nat_ready = (
                      bool(parsed_tfvars.get("enable_lambda_nat_egress", False))
                      or (
                          bool(nat_public_subnet_id)
                          and bool(lambda_nat_route_subnet_ids)
                      )
                  )
                  if not nat_ready:
                      semantic_errors.append(
                          "VPC-attached Lambda with chat_provider=bedrock/agentcore "
                          "requires outbound egress: set enable_lambda_nat_egress=true "
                          "with lambda_nat_public_subnet_id/lambda_nat_route_subnet_ids, "
                          "or record reviewed NAT subnet ids when an existing route "
                          "table already provides egress."
                      )
              if parsed_tfvars.get("enable_lambda_nat_egress", False):
                  if nat_public_subnet_id and nat_create_public_subnet:
                      semantic_errors.append(
                          "enable_lambda_nat_egress must use either "
                          "lambda_nat_public_subnet_id or "
                          "lambda_nat_create_public_subnet=true, not both."
                      )
                  if nat_create_public_subnet and not nat_public_subnet_cidr:
                      semantic_errors.append(
                          "lambda_nat_create_public_subnet=true requires "
                          "lambda_nat_public_subnet_cidr_block."
                      )
                  if (
                      nat_create_public_subnet
                      and not nat_create_internet_gateway
                      and not nat_internet_gateway_id
                  ):
                      semantic_errors.append(
                          "lambda_nat_create_public_subnet=true requires either "
                          "lambda_nat_create_internet_gateway=true or "
                          "lambda_nat_internet_gateway_id in backend-dev-deploy; "
                          "otherwise Terraform auto-discovers an Internet Gateway "
                          "attached to vpc_id and may fail with "
                          "'no matching Internet Gateway found'."
                      )
                  if nat_create_internet_gateway and nat_internet_gateway_id:
                      semantic_errors.append(
                          "enable_lambda_nat_egress must use either "
                          "lambda_nat_internet_gateway_id or "
                          "lambda_nat_create_internet_gateway=true, not both."
                      )
                  if not lambda_nat_route_subnet_ids:
                      semantic_errors.append(
                          "enable_lambda_nat_egress=true requires "
                          "lambda_nat_route_subnet_ids."
                      )
                  if not nat_public_subnet_id and not nat_create_public_subnet:
                      semantic_errors.append(
                          "enable_lambda_nat_egress=true requires "
                          "lambda_nat_public_subnet_id or "
                          "lambda_nat_create_public_subnet=true."
                      )

              if semantic_errors:
                  print("TFVARS_JSON failed deploy profile validation:", file=sys.stderr)
                  for error in semantic_errors:
                      print(f"- {error}", file=sys.stderr)
                  sys.exit(1)

              os.makedirs(os.path.dirname(tf_backend_path), exist_ok=True)
              os.makedirs(os.path.dirname(tf_var_path), exist_ok=True)
              with open(tf_backend_path, "w", encoding="utf-8") as backend_file:
                  backend_file.write(backend_config_hcl.rstrip() + "\n")
              with open(tf_var_path, "w", encoding="utf-8") as tfvars_file:
                  json.dump(parsed_tfvars, tfvars_file, ensure_ascii=False, indent=2)
                  tfvars_file.write("\n")

          required_files = [
              tf_var_path,
              tf_backend_path,
          ]
          missing_files = [path for path in required_files if not os.path.isfile(path)]
          if missing_files:
              print("Missing deploy profile file(s):", file=sys.stderr)
              for path in missing_files:
                  print(f"- {path}", file=sys.stderr)
              sys.exit(1)

          print(f"target_env={target_env}")
          print(f"tf_var_file={tf_var_file}")
          print(f"tf_backend_config={tf_backend_config}")
          print(f"deploy_role_arn={role_arn}")
          PY

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ steps.deploy-profile.outputs.deploy_role_arn }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify deploy account matches Terraform backend
        env:
          DEPLOY_ROLE_ARN: ${{ steps.deploy-profile.outputs.deploy_role_arn }}
          TF_BACKEND_CONFIG: ${{ steps.deploy-profile.outputs.tf_backend_config }}
        run: scripts/verify_deploy_account_matches_backend.sh

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python
        run: uv python install 3.13

      - name: Build Lambda package
        run: ./scripts/package_api_lambda.sh

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Terraform init
        run: >-
          terraform init
          -input=false
          -backend-config="${{ steps.deploy-profile.outputs.tf_backend_config }}"
        working-directory: ${{ env.TF_DIR }}

      - name: Terraform plan
        run: >-
          terraform plan
          -input=false
          -var-file="${{ steps.deploy-profile.outputs.tf_var_file }}"
          -var='operational_alarm_email_addresses=${{ vars.OPERATIONAL_ALARM_EMAILS_JSON }}'
          -out=tfplan
        working-directory: ${{ env.TF_DIR }}

      - name: Terraform apply
        if: github.event_name == 'push' || inputs.apply == true
        run: terraform apply -input=false -auto-approve tfplan
        working-directory: ${{ env.TF_DIR }}

      - name: Skip Terraform apply
        if: github.event_name == 'workflow_dispatch' && inputs.apply != true
        run: echo "Plan-only validation completed. Re-run with apply=true to apply this plan."
