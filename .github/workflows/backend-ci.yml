name: backend-ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests and IaC validation
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      - name: Verify repository contract files
        run: test -f .env.example

      - name: Check Lambda packaging script syntax
        run: bash -n scripts/package_api_lambda.sh

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --locked --extra dev --python 3.13

      - name: Verify deterministic Lambda package
        run: |
          ./scripts/package_api_lambda.sh
          first_hash="$(sha256sum dist/stockbrief-api-lambda.zip | awk '{print $1}')"
          ./scripts/package_api_lambda.sh
          second_hash="$(sha256sum dist/stockbrief-api-lambda.zip | awk '{print $1}')"
          test "$first_hash" = "$second_hash"

      - name: Run tests
        run: uv run pytest --cov=app --cov-report=term-missing --cov-fail-under=80

      - name: Scan prohibited terms
        run: uv run python scripts/check_prohibited_terms.py

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false

      - name: Terraform format check
        run: terraform fmt -check -recursive
        working-directory: infra/terraform

      - name: Terraform init
        run: terraform init -backend=false -input=false
        working-directory: infra/terraform

      - name: Terraform validate
        run: terraform validate -no-color
        working-directory: infra/terraform

  migration-smoke:
    name: Alembic migration smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: stockbrief
          POSTGRES_PASSWORD: stockbrief
          POSTGRES_DB: stockbrief
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stockbrief"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_ENV: local
      DATABASE_URL: postgresql+psycopg://stockbrief:stockbrief@localhost:5432/stockbrief
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --locked --extra dev --python 3.13

      - name: Upgrade to head
        run: uv run alembic upgrade head

      - name: Downgrade to base
        run: uv run alembic downgrade base

      - name: Upgrade to head again
        run: uv run alembic upgrade head

  codeql:
    name: CodeQL code scanning
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          build-mode: none

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"

  security:
    name: Filesystem security scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          scanners: vuln,secret,config
          severity: HIGH,CRITICAL

  package-deploy:
    name: Package deployment artifact
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: [test, migration-smoke, codeql, security]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Set up Python
        run: uv python install 3.13

      - name: Build Lambda package
        run: ./scripts/package_api_lambda.sh

      - name: Upload Lambda artifact
        uses: actions/upload-artifact@v7
        with:
          name: stockbrief-api-lambda-${{ github.sha }}
          path: dist/stockbrief-api-lambda.zip
          if-no-files-found: error
          retention-days: 14
